<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Name</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <a href="#">Studio Name</a>
        </div>

        <nav>
            <ul>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#about">Studio</a></li>
                <li><a href="#news">News</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>


    <main>

        <!-- Hero -->
        <section id="hero">

            <div class="hero-image"></div>

            <div class="hero-caption">
                <!-- Projektname -->
            </div>

        </section>


        <!-- Projekte -->
        <section id="projects">

            <article class="project">
                <div class="project-image"></div>

                <div class="project-info">
                    <h2></h2>
                    <p></p>
                </div>
            </article>

            <article class="project">
                <div class="project-image"></div>

                <div class="project-info">
                    <h2></h2>
                    <p></p>
                </div>
            </article>

            <article class="project">
                <div class="project-image"></div>

                <div class="project-info">
                    <h2></h2>
                    <p></p>
                </div>
            </article>

        </section>


        <!-- Studio -->
        <section id="about">

            <div class="about-text">
                <!-- Bürobeschreibung -->
            </div>

            <div class="about-image">
                <!-- Portrait / Büro -->
            </div>

        </section>


        <!-- News / Publikationen -->
        <section id="news">

            <article class="news-item"></article>

            <article class="news-item"></article>

            <article class="news-item"></article>

        </section>


        <!-- Kontakt -->
        <section id="contact">

            <div class="contact-info">
                <!-- Adresse -->
            </div>

            <div class="contact-map">
                <!-- optional -->
            </div>

        </section>

    </main>


    <!-- Footer -->
    <footer>

        <div>
            © Studio Name
        </div>

        <div>
            Impressum · Datenschutz
        </div>

    </footer>

</body>
</html>
